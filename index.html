<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b0f0d">
    <title>Outdoor Ops</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%230b0f0d'/%3E%3Cpath d='M4.5 18.5h15M7 18.5c.3-3.4 1.4-5.8 3.3-7.5M11.2 18.5c-.1-4.5.5-8.5 1.8-12.3M15 18.5c.2-3.8 1-6.5 2.4-8.5' fill='none' stroke='%235f8f6a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app-shell">
      <aside class="desktop-rail" aria-label="Primary navigation">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true" data-icon="mark"></span>
          <span>
            <strong id="rail-app-name">Outdoor Ops</strong>
            <small id="rail-app-subtitle">Field manual</small>
          </span>
        </div>
        <nav class="rail-nav" id="desktop-nav"></nav>
      </aside>

      <div class="content-shell">
        <header class="top-bar">
          <div>
            <h1 id="view-title">Outdoor Ops</h1>
          </div>
          <button class="home-button" type="button" data-home aria-label="Home">
            <span data-icon="mark"></span>
          </button>
        </header>

        <main id="main" class="views" tabindex="-1">
          <section class="view home-view active" id="home-view" data-view="home" aria-labelledby="home-heading">
            <div class="home-shell">
              <div class="home-lockup">
                <span class="home-mark" aria-hidden="true" data-icon="mark"></span>
                <h2 id="home-heading">Outdoor Ops</h2>
                <p class="eyebrow" id="home-window"></p>
              </div>

              <section class="weather-panel" aria-labelledby="weather-heading">
                <h3 id="weather-heading">3-day outlook</h3>
                <div class="weather-grid" id="weather-grid"></div>
              </section>

              <nav class="launcher-grid" aria-label="Primary sections">
                <button class="launcher-card" type="button" data-nav-target="plan">
                  <span class="launcher-icon" aria-hidden="true" data-icon="plan"></span>
                  <strong>Plan</strong>
                  <small id="launcher-plan-note">Current phase</small>
                </button>
                <button class="launcher-card" type="button" data-nav-target="gear">
                  <span class="launcher-icon" aria-hidden="true" data-icon="gear"></span>
                  <strong>Gear</strong>
                  <small id="launcher-gear-note">Products and settings</small>
                </button>
                <button class="launcher-card" type="button" data-nav-target="property">
                  <span class="launcher-icon" aria-hidden="true" data-icon="property"></span>
                  <strong>Property</strong>
                  <small id="launcher-property-note">Systems and zones</small>
                </button>
              </nav>

            </div>
          </section>

          <section class="view" id="plan-view" data-view="plan" aria-labelledby="plan-heading">
            <h2 class="visually-hidden" id="plan-heading">Plan</h2>

            <section class="focus-panel">
              <p class="eyebrow" id="plan-phase-window"></p>
              <h3 id="plan-phase-title"></h3>
              <p id="plan-main-recommendation"></p>
            </section>

            <section class="tight-section">
              <h3>Support</h3>
              <div class="support-list" id="plan-support-list"></div>
            </section>

            <details class="drawer">
              <summary>Look ahead</summary>
              <div class="lookahead-list" id="plan-lookahead-list"></div>
            </details>
          </section>

          <section class="view" id="gear-view" data-view="gear" aria-labelledby="gear-heading">
            <h2 class="visually-hidden" id="gear-heading">Gear</h2>

            <div class="category-strip" id="gear-category-strip" aria-label="Gear categories"></div>
            <section class="gear-focus" id="gear-focus" aria-live="polite"></section>

            <details class="drawer">
              <summary>Equipment and settings</summary>
              <div class="dense-list" id="gear-equipment-settings"></div>
            </details>

            <details class="drawer">
              <summary>Purchase history</summary>
              <div class="dense-list" id="gear-purchase-history"></div>
            </details>
          </section>

          <section class="view" id="property-view" data-view="property" aria-labelledby="property-heading">
            <h2 class="visually-hidden" id="property-heading">Property</h2>

            <section class="tight-section">
              <h3>Systems</h3>
              <div class="system-list" id="property-systems"></div>
            </section>

            <details class="drawer">
              <summary>Zones and areas</summary>
              <div class="dense-list" id="property-zones"></div>
            </details>

            <details class="drawer">
              <summary>Lessons and references</summary>
              <ul class="lesson-list" id="property-lessons"></ul>
              <div class="dense-list" id="property-sources"></div>
            </details>
          </section>
        </main>
      </div>

      <nav class="bottom-nav" id="bottom-nav" aria-label="Primary navigation"></nav>
    </div>

    <script src="app.js"></script>
  </body>
</html>
